name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/core/**'
      - 'package-lock.json'
      - 'package.json'
      - '.nvmrc'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Notify Discord — new commit
        if: github.event_name == 'push'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          short_sha="${COMMIT_SHA:0:7}"
          commit_url="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          description=$(printf '%s\n\n**Author:** %s\n**Branch:** `%s`\n**Commit:** [`%s`](%s)' \
            "$COMMIT_MSG" "$COMMIT_AUTHOR" "$BRANCH" "$short_sha" "$commit_url")
          bash .github/scripts/discord-notify.sh \
            "New commit on ${REPO}" \
            "$description" \
            3447003 \
            "GitHub · build starting"

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: node -v && npm -v
      - run: npm ci
      - run: npm run build:pages
      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment

  notify:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v6

      - name: Notify Discord — build result
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message || 'Manual workflow run' }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name || github.actor }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          short_sha="${COMMIT_SHA:0:7}"
          commit_url="https://github.com/${REPO}/commit/${COMMIT_SHA}"

          if [[ "$BUILD_RESULT" == "success" && "$DEPLOY_RESULT" == "success" ]]; then
            title="Deploy succeeded"
            color=5763719
            status="Build and GitHub Pages deploy completed successfully."
            if [[ -n "${PAGE_URL:-}" ]]; then
              status="$(printf '%s\n\n**Live site:** %s' "$status" "$PAGE_URL")"
            fi

          elif [[ "$BUILD_RESULT" != "success" ]]; then
            title="Build failed"
            color=15548997
            status="The build job did not complete successfully."
          else
            title="Deploy failed"
            color=15548997
            status="Build succeeded, but the GitHub Pages deploy failed."
          fi

          description=$(printf '%s\n\n**Commit:** [`%s`](%s)\n**Author:** %s\n**Branch:** `%s`\n**Workflow:** [View run](%s)\n\n%s' \
            "$COMMIT_MSG" "$short_sha" "$commit_url" "$COMMIT_AUTHOR" "$BRANCH" "$RUN_URL" "$status")

          bash .github/scripts/discord-notify.sh \
            "$title · ${REPO}" \
            "$description" \
            "$color" \
            "GitHub Actions · GitHub Pages"
